  # ========================================
  # SAFETY WALKS + UNIFIED CAPA (10 endpoints)
  # ========================================
  /api/ehs/safety-walks:
    get:
      operationId: listSafetyWalks
      tags: [SafetyWalks]
      summary: List safety walks
      parameters:
        - name: locationId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/SafetyWalkStatus'
        - name: scheduledAfter
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: scheduledBefore
          in: query
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Safety walk list rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SafetyWalkListItemDto'

    post:
      operationId: scheduleSafetyWalk
      tags: [SafetyWalks]
      summary: Schedule a safety walk (FSM entry — Scheduled/utemezett)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ScheduleSafetyWalkRequest'
      responses:
        '201':
          description: Walk scheduled (returns the new id)
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/ehs/safety-walks/{id}:
    get:
      operationId: getSafetyWalk
      tags: [SafetyWalks]
      summary: Get safety walk by ID (with findings)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Walk detail with findings
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SafetyWalkDto'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/ehs/safety-walks/{id}/start:
    post:
      operationId: startSafetyWalk
      tags: [SafetyWalks]
      summary: "FSM: Scheduled → InProgress (folyamatban)"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Walk started
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/ehs/safety-walks/{id}/findings:
    post:
      operationId: addSafetyWalkFinding
      tags: [SafetyWalks]
      summary: Record a finding (+ optional CAPA generation)
      description: |
        Only allowed while the walk is InProgress (otherwise 409).
        When requiresAction=true and capaAssignedTo+capaDueDate are provided,
        a corrective action is spawned through the UNIFIED CAPA mechanism
        (same table incidents use) and linked to the finding.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddSafetyWalkFindingRequest'
      responses:
        '201':
          description: Finding recorded (returns findingId + optional correctiveActionId)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddSafetyWalkFindingResult'
        '404':
          $ref: '#/components/responses/NotFound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/ehs/safety-walks/{id}/complete:
    post:
      operationId: completeSafetyWalk
      tags: [SafetyWalks]
      summary: "FSM: InProgress → ActionRequired (intezkedes) or Closed (lezart)"
      description: |
        Transitions to ActionRequired when any finding requires action,
        otherwise closes the walk directly. Returns the resulting status.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Resulting FSM status
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/ehs/safety-walks/{id}/close:
    post:
      operationId: closeSafetyWalk
      tags: [SafetyWalks]
      summary: "FSM: ActionRequired → Closed (guard: all linked CAPAs completed)"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Walk closed
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/ehs/safety-walks/{id}/cancel:
    post:
      operationId: cancelSafetyWalk
      tags: [SafetyWalks]
      summary: "FSM: Scheduled → Cancelled (elmaradt)"
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Walk cancelled
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/ehs/corrective-actions:
    get:
      operationId: listCorrectiveActions
      tags: [CorrectiveActions]
      summary: Unified CAPA board
      description: |
        One list for corrective actions from every source
        (incident investigation, safety walk finding, risk assessment).
      parameters:
        - name: completed
          in: query
          required: false
          schema:
            type: boolean
        - name: assignedTo
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: source
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/CapaSource'
        - name: sourceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: CAPA board rows ordered by due date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CapaDto'

  /api/ehs/corrective-actions/{id}/complete:
    post:
      operationId: completeCorrectiveAction
      tags: [CorrectiveActions]
      summary: Complete a corrective action (any source)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: CAPA completed
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

# ========================================
# COMPONENTS (Schemas, Responses, SecuritySchemes)
# ========================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ========================================
    # INCIDENT AGGREGATE
    # ========================================
    IncidentDto:
      type: object
      required:
        - incidentId
        - tenantId
        - incidentType
        - incidentDate
        - location
        - description
        - severity
        - status
        - reportedBy
        - reportedAt
      properties:
        incidentId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        incidentType:
          $ref: '#/components/schemas/IncidentType'
        incidentDate:
          type: string
          format: date-time
        location:
          type: string
        description:
          type: string
          description: Markdown-formatted incident description
        severity:
          type: integer
          minimum: 1
          maximum: 5
          description: "1=Negligible, 5=Catastrophic"
        status:
          $ref: '#/components/schemas/IncidentStatus'
        reportedBy:
          type: string
          format: uuid
          description: EmployeeId (FK to HR module)
        reportedAt:
          type: string
          format: date-time
        investigatedBy:
          type: ['string', 'null']
          format: uuid
          description: EmployeeId (nullable)
        investigatedAt:
          type: ['string', 'null']
          format: date-time
        closedAt:
          type: ['string', 'null']
          format: date-time
        investigation:
          oneOf:
            - $ref: '#/components/schemas/IncidentInvestigationDto'
            - type: 'null'
        correctiveActions:
          type: array
          items:
            $ref: '#/components/schemas/CorrectiveActionDto'
        witnesses:
          type: array
          items:
            $ref: '#/components/schemas/IncidentWitnessDto'

    IncidentType:
      type: string
      enum:
        - Accident
        - NearMiss
        - HazardousCondition

    IncidentStatus:
      type: string
      enum:
        - Reported
        - Investigated
        - CorrectiveActionPlanned
        - Closed
        - Reopened
      description: |
        FSM states:
        Reported → Investigated → CorrectiveActionPlanned → Closed
        Closed → Reopened (optional)

    IncidentInvestigationDto:
      type: object
      required:
        - findings
        - rootCause
      properties:
        findings:
          type: string
          description: Markdown-formatted investigation findings
        rootCause:
          type: string
          description: Identified root cause

    CorrectiveActionDto:
      type: object
      required:
        - description
        - responsiblePerson
        - dueDate
      properties:
        description:
          type: string
        responsiblePerson:
          type: string
          format: uuid
          description: EmployeeId
        dueDate:
          type: string
          format: date
        completedAt:
          type: ['string', 'null']
          format: date

    IncidentWitnessDto:
      type: object
      required:
        - employeeId
        - statement
      properties:
        employeeId:
          type: string
          format: uuid
          description: EmployeeId (FK to HR module)
        statement:
          type: string
          description: Witness statement

    CreateIncidentCommand:
      type: object
      required:
        - incidentType
        - incidentDate
        - location
        - description
        - severity
      properties:
        incidentType:
          $ref: '#/components/schemas/IncidentType'
        incidentDate:
          type: string
          format: date-time
        location:
          type: string
        description:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5

    StartInvestigationCommand:
      type: object
      required:
        - investigatedBy
      properties:
        investigatedBy:
          type: string
          format: uuid
          description: EmployeeId

    AddCorrectiveActionCommand:
      type: object
      required:
        - description
        - responsiblePerson
        - dueDate
      properties:
        description:
          type: string
        responsiblePerson:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date
        findings:
          type: string
          description: Investigation findings (optional)
        rootCause:
          type: string
          description: Root cause analysis (optional)

    CloseIncidentCommand:
      type: object
      required:
        - closureNotes
      properties:
        closureNotes:
          type: string

    ReopenIncidentCommand:
      type: object
      required:
        - reopenReason
      properties:
        reopenReason:
          type: string

    AddWitnessCommand:
      type: object
      required:
        - employeeId
        - statement
      properties:
        employeeId:
          type: string
          format: uuid
        statement:
          type: string

    IncidentSummaryDto:
      type: object
      required:
        - totalIncidents
        - byType
        - bySeverity
        - byStatus
      properties:
        totalIncidents:
          type: integer
        byType:
          type: object
          properties:
            accidents:
              type: integer
            nearMisses:
              type: integer
            hazardousConditions:
              type: integer
        bySeverity:
          type: object
          properties:
            severity1:
              type: integer
            severity2:
              type: integer
            severity3:
              type: integer
            severity4:
              type: integer
            severity5:
              type: integer
        byStatus:
          type: object
          properties:
            reported:
              type: integer
            investigated:
              type: integer
            correctiveActionPlanned:
              type: integer
            closed:
              type: integer
            reopened:
              type: integer

    IncidentTrendsDto:
      type: object
      required:
        - months
      properties:
        months:
          type: array
          items:
            type: object
            required:
              - month
              - totalIncidents
              - byType
            properties:
              month:
                type: string
                format: date
                description: "YYYY-MM-01 format"
              totalIncidents:
                type: integer
              byType:
                type: object
                properties:
                  accidents:
                    type: integer
                  nearMisses:
                    type: integer
                  hazardousConditions:
                    type: integer

    PagedIncidentResponse:
      type: object
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/IncidentDto'
        totalCount:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    # ========================================
    # RISK ASSESSMENT AGGREGATE
    # ========================================
    RiskAssessmentDto:
      type: object
      required:
        - riskAssessmentId
        - tenantId
        - hazardDescription
        - severity
        - likelihood
        - riskScore
        - riskLevel
        - assessedBy
        - assessedAt
        - reviewDueDate
        - status
      properties:
        riskAssessmentId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        hazardDescription:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
          description: "1=Negligible, 5=Catastrophic"
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
          description: "1=Rare, 5=Almost Certain"
        riskScore:
          type: integer
          minimum: 1
          maximum: 25
          description: "Calculated: Severity × Likelihood"
        riskLevel:
          $ref: '#/components/schemas/RiskLevel'
        assessedBy:
          type: string
          format: uuid
          description: EmployeeId (FK to HR module)
        assessedAt:
          type: string
          format: date-time
        reviewDueDate:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/RiskAssessmentStatus'
        controls:
          type: array
          items:
            $ref: '#/components/schemas/RiskControlDto'

    RiskLevel:
      type: string
      enum:
        - Low
        - Medium
        - High
      description: |
        Calculated based on RiskScore:
        Low: 1-5
        Medium: 6-12
        High: 15-25

    RiskAssessmentStatus:
      type: string
      enum:
        - Active
        - Archived

    RiskControlDto:
      type: object
      required:
        - description
        - implementationDate
      properties:
        description:
          type: string
        implementationDate:
          type: string
          format: date
        responsiblePerson:
          type: ['string', 'null']
          format: uuid
          description: EmployeeId (optional)

    CreateRiskAssessmentCommand:
      type: object
      required:
        - hazardDescription
        - severity
        - likelihood
        - reviewDueDate
      properties:
        hazardDescription:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        reviewDueDate:
          type: string
          format: date

    UpdateRiskAssessmentCommand:
      type: object
      properties:
        hazardDescription:
          type: string
        severity:
          type: integer
          minimum: 1
          maximum: 5
        likelihood:
          type: integer
          minimum: 1
          maximum: 5
        reviewDueDate:
          type: string
          format: date

    AddRiskControlCommand:
      type: object
      required:
        - description
        - implementationDate
      properties:
        description:
          type: string
        implementationDate:
          type: string
          format: date
        responsiblePerson:
          type: string
          format: uuid
          description: EmployeeId (optional)

    RiskMatrixDto:
      type: object
      required:
        - matrix
      properties:
        matrix:
          type: array
          items:
            type: array
            items:
              type: integer
              description: "Count of risk assessments in this cell"
          description: "5×5 grid: matrix[severity-1][likelihood-1]"
        legend:
          type: object
          properties:
            low:
              type: array
              items:
                type: object
                properties:
                  severity:
                    type: integer
                  likelihood:
                    type: integer
            medium:
              type: array
              items:
                type: object
                properties:
                  severity:
                    type: integer
                  likelihood:
                    type: integer
            high:
              type: array
              items:
                type: object
                properties:
                  severity:
                    type: integer
                  likelihood:
                    type: integer

    PagedRiskAssessmentResponse:
      type: object
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/RiskAssessmentDto'
        totalCount:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    # ========================================
    # TRAINING RECORD AGGREGATE
    # ========================================
    TrainingRecordDto:
      type: object
      required:
        - trainingRecordId
        - tenantId
        - employeeId
        - trainingType
        - completedAt
        - status
      properties:
        trainingRecordId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        employeeId:
          type: string
          format: uuid
          description: EmployeeId (FK to HR module)
        trainingType:
          type: string
          description: "e.g., 'First Aid', 'Fire Safety', 'Machine Operation'"
        completedAt:
          type: string
          format: date-time
        expiresAt:
          type: ['string', 'null']
          format: date-time
        issuedBy:
          type: ['string', 'null']
          description: Certifying authority
        certificateNumber:
          type: ['string', 'null']
        status:
          $ref: '#/components/schemas/TrainingStatus'

    TrainingStatus:
      type: string
      enum:
        - Valid
        - Expiring
        - Expired
      description: |
        Calculated based on ExpiresAt:
        Valid: >30 days until expiration
        Expiring: ≤30 days until expiration
        Expired: Past expiration date

    CreateTrainingRecordCommand:
      type: object
      required:
        - employeeId
        - trainingType
        - completedAt
      properties:
        employeeId:
          type: string
          format: uuid
        trainingType:
          type: string
        completedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          description: Optional expiration date
        issuedBy:
          type: string
        certificateNumber:
          type: string

    RenewTrainingRecordCommand:
      type: object
      required:
        - completedAt
      properties:
        completedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    PagedTrainingRecordResponse:
      type: object
      required:
        - items
        - totalCount
        - page
        - pageSize
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TrainingRecordDto'
        totalCount:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    # ========================================
    # COMMON ERROR RESPONSES
    # ========================================
    ErrorResponse:
      type: object
      required:
        - error
        - message
      properties:
        error:
          type: string
        message:
          type: string
        details:
          type: ['object', 'null']

    # ========================================
    # LOCATION REGISTRY
    # ========================================
    LocationKind:
      type: string
      enum: [Site, Building, Hall, Zone, Outdoor]
      description: Kind of a node in the hierarchical location registry

    EhsLocationDto:
      type: object
      required: [locationId, tenantId, code, name, kind, isActive, createdAt]
      properties:
        locationId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        code:
          type: string
          description: Short unique code per tenant, e.g. "VAC-A"
        name:
          type: string
          description: Display name, e.g. "Vác — főüzem / A csarnok"
        parentLocationId:
          type: ['string', 'null']
          format: uuid
          description: Parent node (null = root/site level)
        kind:
          $ref: '#/components/schemas/LocationKind'
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateLocationRequest:
      type: object
      required: [code, name, kind]
      properties:
        code:
          type: string
          maxLength: 50
        name:
          type: string
          maxLength: 200
        kind:
          $ref: '#/components/schemas/LocationKind'
        parentLocationId:
          type: ['string', 'null']
          format: uuid

    # ========================================
    # HAZARDOUS MATERIAL / SDS REGISTRY
    # ========================================
    MaterialStatus:
      type: string
      enum: [Active, Archived]
      description: Material registry lifecycle (Active → Archived)

    SdsValidity:
      type: string
      enum: [Valid, Expiring, Expired]
      description: "CALCULATED from sdsExpiresAt: Valid (>30d), Expiring (≤30d), Expired"

    HazardousMaterialDto:
      type: object
      required: [materialId, tenantId, name, supplier, storageLocationId, quantityOnSite, unit, sdsIssuedAt, sdsExpiresAt, status, sdsValidity]
      properties:
        materialId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        supplier:
          type: string
        casNumber:
          type: ['string', 'null']
          description: CAS registry number, e.g. "67-64-1"
        ghsHazardClasses:
          type: array
          items:
            type: string
          description: GHS pictogram codes, e.g. "GHS02"
        storageLocationId:
          type: string
          format: uuid
          description: FK to EhsLocation
        quantityOnSite:
          type: number
        unit:
          type: string
        sdsDocumentId:
          type: ['string', 'null']
          format: uuid
          description: FK to DMS document
        sdsIssuedAt:
          type: string
          format: date-time
        sdsExpiresAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/MaterialStatus'
        sdsValidity:
          $ref: '#/components/schemas/SdsValidity'
        registeredAt:
          type: string
          format: date-time

    HazardousMaterialListItemDto:
      type: object
      required: [materialId, name, supplier, storageLocationId, sdsExpiresAt, status, sdsValidity]
      properties:
        materialId:
          type: string
          format: uuid
        name:
          type: string
        supplier:
          type: string
        storageLocationId:
          type: string
          format: uuid
        quantityOnSite:
          type: number
        unit:
          type: string
        sdsExpiresAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/MaterialStatus'
        sdsValidity:
          $ref: '#/components/schemas/SdsValidity'

    RegisterHazardousMaterialRequest:
      type: object
      required: [name, supplier, storageLocationId, quantityOnSite, unit, sdsIssuedAt, sdsExpiresAt]
      properties:
        name:
          type: string
          maxLength: 200
        supplier:
          type: string
          maxLength: 200
        storageLocationId:
          type: string
          format: uuid
        quantityOnSite:
          type: number
          minimum: 0
        unit:
          type: string
          maxLength: 20
        sdsIssuedAt:
          type: string
          format: date-time
        sdsExpiresAt:
          type: string
          format: date-time
        casNumber:
          type: ['string', 'null']
        ghsHazardClasses:
          type: array
          items:
            type: string
        sdsDocumentId:
          type: ['string', 'null']
          format: uuid

    UpdateHazardousMaterialRequest:
      type: object
      required: [name, supplier, storageLocationId, quantityOnSite, unit]
      properties:
        name:
          type: string
          maxLength: 200
        supplier:
          type: string
          maxLength: 200
        storageLocationId:
          type: string
          format: uuid
        quantityOnSite:
          type: number
          minimum: 0
        unit:
          type: string
          maxLength: 20
        casNumber:
          type: ['string', 'null']
        ghsHazardClasses:
          type: array
          items:
            type: string

    RenewSdsRequest:
      type: object
      required: [newIssuedAt, newExpiresAt]
      properties:
        newIssuedAt:
          type: string
          format: date-time
        newExpiresAt:
          type: string
          format: date-time
        newSdsDocumentId:
          type: ['string', 'null']
          format: uuid

    # ========================================
    # PPE CATALOGUE + ISSUANCE FSM
    # ========================================
    PpeCategory:
      type: string
      enum: [Head, Eye, Hearing, Respiratory, Hand, Foot, Body, Fall]

    PpeIssuanceStatus:
      type: string
      enum: [Issued, Acknowledged, Returned, Replaced]
      description: "FSM: Issued(kiadva) → Acknowledged(atvett) → Returned(visszavett) | Replaced(cserelve)"

    PpeItemDto:
      type: object
      required: [ppeItemId, tenantId, name, category, isActive, createdAt]
      properties:
        ppeItemId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        name:
          type: string
        category:
          $ref: '#/components/schemas/PpeCategory'
        standardRef:
          type: ['string', 'null']
          description: Reference standard, e.g. "EN 388"
        defaultLifetimeMonths:
          type: ['integer', 'null']
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreatePpeItemRequest:
      type: object
      required: [name, category]
      properties:
        name:
          type: string
          maxLength: 200
        category:
          $ref: '#/components/schemas/PpeCategory'
        standardRef:
          type: ['string', 'null']
        defaultLifetimeMonths:
          type: ['integer', 'null']
          minimum: 1

    PpeIssuanceDto:
      type: object
      required: [issuanceId, tenantId, employeeId, ppeItemId, issuedAt, issuedBy, quantity, status, isExpired]
      properties:
        issuanceId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        employeeId:
          type: string
          format: uuid
          description: FK to HR module
        ppeItemId:
          type: string
          format: uuid
        issuedAt:
          type: string
          format: date-time
        issuedBy:
          type: string
          format: uuid
        quantity:
          type: integer
        expiresAt:
          type: ['string', 'null']
          format: date-time
        status:
          $ref: '#/components/schemas/PpeIssuanceStatus'
        acknowledgedAt:
          type: ['string', 'null']
          format: date-time
        returnedAt:
          type: ['string', 'null']
          format: date-time
        replacedAt:
          type: ['string', 'null']
          format: date-time
        replacementIssuanceId:
          type: ['string', 'null']
          format: uuid
          description: Set on Replaced — the new issuance
        isExpired:
          type: boolean
          description: CALCULATED — expiresAt passed while the PPE is still out

    IssuePpeRequest:
      type: object
      required: [employeeId, ppeItemId, issuedBy, quantity]
      properties:
        employeeId:
          type: string
          format: uuid
        ppeItemId:
          type: string
          format: uuid
        issuedBy:
          type: string
          format: uuid
        quantity:
          type: integer
          minimum: 1
        expiresAt:
          type: ['string', 'null']
          format: date-time
          description: Optional — derived from defaultLifetimeMonths when omitted

    ReplacePpeIssuanceRequest:
      type: object
      required: [replacedBy]
      properties:
        replacedBy:
          type: string
          format: uuid
        newExpiresAt:
          type: ['string', 'null']
          format: date-time

    # ========================================
    # SAFETY WALKS + UNIFIED CAPA
    # ========================================
    SafetyWalkStatus:
      type: string
      enum: [Scheduled, InProgress, ActionRequired, Closed, Cancelled]
      description: "FSM: Scheduled(utemezett) → InProgress(folyamatban) → ActionRequired(intezkedes) → Closed(lezart), +Cancelled(elmaradt)"

    CapaSource:
      type: string
      enum: [Incident, SafetyWalk, RiskAssessment]
      description: Which mechanism spawned the corrective action

    SafetyWalkDto:
      type: object
      required: [safetyWalkId, tenantId, locationId, scheduledDate, conductedBy, status, findings]
      properties:
        safetyWalkId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        locationId:
          type: string
          format: uuid
          description: FK to EhsLocation
        scheduledDate:
          type: string
          format: date-time
        conductedBy:
          type: string
          format: uuid
        participants:
          type: array
          items:
            type: string
            format: uuid
        status:
          $ref: '#/components/schemas/SafetyWalkStatus'
        startedAt:
          type: ['string', 'null']
          format: date-time
        completedAt:
          type: ['string', 'null']
          format: date-time
        closedAt:
          type: ['string', 'null']
          format: date-time
        cancelledAt:
          type: ['string', 'null']
          format: date-time
        findings:
          type: array
          items:
            $ref: '#/components/schemas/SafetyWalkFindingDto'

    SafetyWalkFindingDto:
      type: object
      required: [findingId, description, severity, requiresAction, recordedAt]
      properties:
        findingId:
          type: string
          format: uuid
        description:
          type: string
        severity:
          type: string
          enum: [Negligible, Minor, Moderate, Major, Catastrophic]
        photoS3Key:
          type: ['string', 'null']
          description: Evidence photo (mobile intake integration)
        requiresAction:
          type: boolean
        correctiveActionId:
          type: ['string', 'null']
          format: uuid
          description: Linked unified CAPA
        linkedRiskAssessmentId:
          type: ['string', 'null']
          format: uuid
        recordedAt:
          type: string
          format: date-time

    SafetyWalkListItemDto:
      type: object
      required: [safetyWalkId, locationId, scheduledDate, conductedBy, status, findingCount]
      properties:
        safetyWalkId:
          type: string
          format: uuid
        locationId:
          type: string
          format: uuid
        scheduledDate:
          type: string
          format: date-time
        conductedBy:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/SafetyWalkStatus'
        findingCount:
          type: integer

    ScheduleSafetyWalkRequest:
      type: object
      required: [locationId, scheduledDate, conductedBy]
      properties:
        locationId:
          type: string
          format: uuid
        scheduledDate:
          type: string
          format: date-time
        conductedBy:
          type: string
          format: uuid
        participants:
          type: array
          items:
            type: string
            format: uuid

    AddSafetyWalkFindingRequest:
      type: object
      required: [description, severity, requiresAction]
      properties:
        description:
          type: string
          maxLength: 2000
        severity:
          type: string
          enum: [Negligible, Minor, Moderate, Major, Catastrophic]
        requiresAction:
          type: boolean
        photoS3Key:
          type: ['string', 'null']
        linkedRiskAssessmentId:
          type: ['string', 'null']
          format: uuid
        capaDescription:
          type: ['string', 'null']
          description: CAPA description (defaults to the finding description)
        capaAssignedTo:
          type: ['string', 'null']
          format: uuid
          description: Providing capaAssignedTo + capaDueDate spawns a unified CAPA
        capaDueDate:
          type: ['string', 'null']
          format: date-time

    AddSafetyWalkFindingResult:
      type: object
      required: [findingId]
      properties:
        findingId:
          type: string
          format: uuid
        correctiveActionId:
          type: ['string', 'null']
          format: uuid
          description: Set when a CAPA was spawned for the finding

    CapaDto:
      type: object
      required: [correctiveActionId, tenantId, source, sourceId, description, assignedTo, dueDate, isCompleted]
      properties:
        correctiveActionId:
          type: string
          format: uuid
        tenantId:
          type: string
          format: uuid
        source:
          $ref: '#/components/schemas/CapaSource'
        sourceId:
          type: string
          format: uuid
          description: IncidentId or SafetyWalkId that spawned the CAPA
        incidentId:
          type: ['string', 'null']
          format: uuid
        findingId:
          type: ['string', 'null']
          format: uuid
        description:
          type: string
        assignedTo:
          type: string
          format: uuid
        dueDate:
          type: string
          format: date-time
        completedAt:
          type: ['string', 'null']
          format: date-time
        isCompleted:
          type: boolean

  responses:
    Unauthorized:
      description: Unauthorized (missing or invalid JWT token)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Forbidden:
      description: Forbidden (insufficient permissions or RLS violation)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    BadRequest:
      description: Bad request (validation error)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    Conflict:
      description: Domain guard violation (illegal FSM transition or business rule)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
