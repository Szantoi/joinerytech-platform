openapi: 3.1.0
info:
  title: SpaceOS DMS Module API
  version: 2.0.0
  description: |
    Document Management System (DMS) module — Document core with the approval
    workflow (DMS-BE-HOST). The contract mirrors the portal MSW pre-image
    (`src/joinerytech-portal/src/modules/dms/services` + `mocks`) — the portal
    zod `documentSchema` parses these responses 1:1.

    ## Approval workflow (portal DOCUMENT_FSM mirror)

    ```
    action    from               to
    ───────   ────────────────   ───────────
    submit    draft              underReview
    approve   underReview        released
    reject    underReview        draft        (reason MANDATORY)
    recall    released           underReview
    archive   draft | released   archived     (not allowed during review)
    reopen    archived           draft
    ```

    - Every transition + version upload returns the FRESH document (the UI
      reconciles optimistic updates from the body).
    - `releasedVersion` and `expiry` are COMPUTED at serve time (never stored):
      the shop floor uses the latest RELEASED version; the expiry window is
      config-driven (`Dms:Expiry:WarnDays`, default 30 — portal
      EXPIRY_WARN_DAYS mirror).
    - Version chain: `POST /{id}/versions` increments the number, PRESERVES
      earlier entries and starts the new version as a `draft` working copy —
      the previously released version stays valid until re-approval.
    - `deleted` is an admin-level soft-delete outside the FSM: such documents
      are invisible on every read path.

    ## Error contract (portal MSW mirror)

    `{ "error": string, "message": string }` bodies:
    - **404** unknown document id
    - **409** illegal FSM transition / version upload on archived document
    - **400** payload guard (missing reject reason, missing version fields,
      invalid enum value, missing tenant header on create)

    ## Multi-tenancy

    Row-Level Security scoped by the `X-Tenant-Id` header (JWT claim source is
    the auth integration follow-up). Mutations that create data REQUIRE the
    header.

    ## Planned (Phase 2 — not implemented, endpoint layer pending)

    Blob content flow (multipart upload / download / presigned URL — the
    `IDocumentBlobStore` port with a filesystem stub is in place),
    entity links, permission matrix, folders, full-text search, document
    category + tag endpoints (handlers exist), admin soft-delete/restore
    endpoints.
tags:
  - name: Documents
    description: Versioned document register with the approval workflow
  - name: Health
    description: Liveness probe

paths:
  /api/dms/documents:
    get:
      tags: [Documents]
      operationId: ListDocuments
      summary: List documents
      description: |
        Optional filters (portal list contract). Default order: most recently
        updated first. With `expiring=true`: expired + expiring within the
        config window, archived excluded, earliest validity first.
        Soft-deleted documents never appear.
      parameters:
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/DocumentStatus'
        - name: type
          in: query
          schema:
            $ref: '#/components/schemas/DocType'
        - name: linkType
          in: query
          schema:
            $ref: '#/components/schemas/DocLinkType'
        - name: q
          in: query
          description: Free-text search (name / linkLabel / fileLabel, case-insensitive)
          schema:
            type: string
        - name: expiring
          in: query
          description: true → only expired/expiring documents (config window)
          schema:
            type: boolean
      responses:
        '200':
          description: Documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/BadRequest'
    post:
      tags: [Documents]
      operationId: CreateDocument
      summary: Create document (backend extra — the portal mock is seeded)
      description: |
        Creates a document with its v1 `draft` working-copy version.
        Metadata-only until the blob flow lands (`fileLabel` represents the
        file). Requires the `X-Tenant-Id` header.
      parameters:
        - $ref: '#/components/parameters/TenantHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '201':
          description: Created document (fresh DTO; Location header set)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/dms/documents/{id}:
    get:
      tags: [Documents]
      operationId: GetDocument
      summary: Document detail (full version chain + computed fields)
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          description: Document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Document'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/dms/documents/{id}/submit:
    post:
      tags: [Documents]
      operationId: SubmitDocument
      summary: 'FSM: draft → underReview (send for review)'
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          $ref: '#/components/responses/FreshDocument'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/dms/documents/{id}/approve:
    post:
      tags: [Documents]
      operationId: ApproveDocument
      summary: 'FSM: underReview → released (optional note → reviewNote)'
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note:
                  type: string
                  description: Optional approval note (stored as reviewNote)
      responses:
        '200':
          $ref: '#/components/responses/FreshDocument'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/dms/documents/{id}/reject:
    post:
      tags: [Documents]
      operationId: RejectDocument
      summary: 'FSM: underReview → draft (MANDATORY reason → reviewNote)'
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:
                  type: string
                  description: Rejection reason — missing/blank → 400 (MSW guard mirror)
      responses:
        '200':
          $ref: '#/components/responses/FreshDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/dms/documents/{id}/recall:
    post:
      tags: [Documents]
      operationId: RecallDocument
      summary: 'FSM: released → underReview (re-review; shop floor falls back to the previous released version)'
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
                  description: Optional recall reason (stored as reviewNote)
      responses:
        '200':
          $ref: '#/components/responses/FreshDocument'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/dms/documents/{id}/archive:
    post:
      tags: [Documents]
      operationId: ArchiveDocument
      summary: 'FSM: draft | released → archived (not allowed during review; the version chain is untouched)'
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          $ref: '#/components/responses/FreshDocument'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/dms/documents/{id}/reopen:
    post:
      tags: [Documents]
      operationId: ReopenDocument
      summary: 'FSM: archived → draft (reopen as working copy; the version chain is untouched)'
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      responses:
        '200':
          $ref: '#/components/responses/FreshDocument'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/dms/documents/{id}/versions:
    post:
      tags: [Documents]
      operationId: UploadDocumentVersion
      summary: Upload a new version (number +1, chain preserved, draft working copy)
      description: |
        The document falls back to `draft` and must pass the approval gate
        again; the previously released version stays the valid one. Archived
        document → 409; missing fileLabel/note → 400 (MSW guard mirrors).
        Real file content is the blob-flow follow-up (`fileLabel` only).
      parameters:
        - $ref: '#/components/parameters/DocumentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileLabel, note]
              properties:
                fileLabel:
                  type: string
                  description: File label of the new version
                note:
                  type: string
                  description: Change note (audit trail — mandatory)
                uploadedBy:
                  type: string
                  description: Optional uploader display name (auth follow-up; defaults to the owner)
      responses:
        '200':
          $ref: '#/components/responses/FreshDocument'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /health:
    get:
      tags: [Health]
      operationId: Health
      summary: Liveness probe
      responses:
        '200':
          description: Host is up
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: ok
                  module:
                    type: string
                    const: dms

components:
  parameters:
    DocumentId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TenantHeader:
      name: X-Tenant-Id
      in: header
      required: true
      description: Tenant id for RLS scoping (auth/JWT claim source is a follow-up)
      schema:
        type: string
        format: uuid

  responses:
    FreshDocument:
      description: The fresh document after the mutation (optimistic-update reconciliation source)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Document'
    BadRequest:
      description: Payload guard violation (MSW 400 mirror)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Document not found (or soft-deleted)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Conflict:
      description: Illegal FSM transition / status guard (MSW 409 mirror)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  schemas:
    DocumentStatus:
      type: string
      enum: [draft, underReview, released, archived]
      description: |
        Approval-workflow status (camelCase wire form of the FSM naming).
        Portal canonical key mapping (wire-language ADR candidate):
        draft=piszkozat, underReview=ellenorzes, released=kiadott,
        archived=archivalt. The admin-level `deleted` state never appears on
        the wire (soft-deleted documents are invisible).

    DocType:
      type: string
      enum: [rajz, szerzodes, tanusitvany, utasitas, egyeb]
      description: Document type — the prototype DOC_TYPE_META canonical keys (portal parity 1:1)

    DocLinkType:
      type: string
      enum: [project, order, catalog, template, customer, none]
      description: Display link type — what the document belongs to (portal parity 1:1)

    ExpiryState:
      type: string
      enum: [lejart, lejaro]
      description: |
        Computed expiry state (portal parity 1:1): lejart = validUntil passed;
        lejaro = within the config window (Dms:Expiry:WarnDays). Outside the
        window (or without validUntil) the field is null.

    VersionEntry:
      type: object
      description: |
        Version-chain entry (portal versionEntrySchema mirror). `status` is the
        lifecycle snapshot of THAT version — review actions track the current
        version's entry; the released-version calculation derives from these.
      required: [v, fileLabel, note, status, uploadedBy, uploadedAt]
      properties:
        v:
          type: integer
          description: Version number
        fileLabel:
          type: string
        note:
          type: string
          description: Change note (audit trail)
        status:
          $ref: '#/components/schemas/DocumentStatus'
        uploadedBy:
          type: string
          description: Uploader display name (auth follow-up)
        uploadedAt:
          type: string
          format: date-time

    Document:
      type: object
      description: Portal documentSchema (MSW contract) mirror
      required:
        - id
        - name
        - type
        - status
        - version
        - linkType
        - linkLabel
        - owner
        - fileLabel
        - updatedAt
        - versions
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 255
        type:
          $ref: '#/components/schemas/DocType'
        status:
          $ref: '#/components/schemas/DocumentStatus'
        version:
          type: integer
          description: Current (highest) version number — the chain length
        linkType:
          $ref: '#/components/schemas/DocLinkType'
        linkId:
          type: [string, 'null']
        linkLabel:
          type: string
        owner:
          type: string
          description: Owner display name (auth follow-up)
        note:
          type: [string, 'null']
        reviewNote:
          type: [string, 'null']
          description: Note of the LAST transition (approval note / rejection reason)
        fileLabel:
          type: string
        validUntil:
          type: [string, 'null']
          format: date
          description: Validity end (null = never expires)
        updatedAt:
          type: string
          format: date-time
        versions:
          type: array
          description: Full version chain (earlier versions preserved)
          items:
            $ref: '#/components/schemas/VersionEntry'
        releasedVersion:
          type: [integer, 'null']
          description: 'COMPUTED: the latest released version number — the shop floor uses this; null = never released (production blocked)'
        expiry:
          description: 'COMPUTED: expiry state within the config window (null outside the window)'
          oneOf:
            - $ref: '#/components/schemas/ExpiryState'
            - type: 'null'

    CreateDocumentRequest:
      type: object
      required: [name, type, owner, fileLabel]
      properties:
        name:
          type: string
          maxLength: 255
        type:
          $ref: '#/components/schemas/DocType'
        linkType:
          $ref: '#/components/schemas/DocLinkType'
        linkId:
          type: [string, 'null']
        linkLabel:
          type: string
          description: Required when linkType is not none
        owner:
          type: string
        note:
          type: [string, 'null']
        fileLabel:
          type: string
        validUntil:
          type: [string, 'null']
          format: date

    Error:
      type: object
      description: 'MSW jsonError mirror: {error, message}'
      required: [error, message]
      properties:
        error:
          type: string
          enum: [BadRequest, NotFound, Conflict]
        message:
          type: string
          description: Human-readable (Hungarian) guard message — identical wording to the portal MSW guards
